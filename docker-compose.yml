services:
  postgres:
    image: postgres:16
    container_name: journalapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: journaluser
      POSTGRES_PASSWORD: journalpassword
      POSTGRES_DB: journalapp
    ports:
      - "5432:5432"
    volumes:
      - journalapp_postgres_data:/var/lib/postgresql/data

volumes:
  journalapp_postgres_data: